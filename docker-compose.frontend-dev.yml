services:
  game-frontend:
    image: node:18-alpine
    build: !reset null
    working_dir: /app
    command: >
      sh -lc "if [ ! -d node_modules/react-scripts ]; then npm ci; fi;
      npm start"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      BROWSER: none
      CI: "false"
      WDS_SOCKET_HOST: 192.168.0.114
      WDS_SOCKET_PORT: 3100
      WDS_SOCKET_PATH: /ws
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_APP_PROXY_TARGET: http://game-backend:4000
      REACT_APP_API_ENDPOINT:
      REACT_APP_SOCKET_URL:
    volumes:
      - ./frontend:/app
      - holdem_frontend_node_modules:/app/node_modules
    ports: !override
      - "3100:3000"

volumes:
  holdem_frontend_node_modules:
