<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Big Slick Games</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #5b6472;
      --line: #d8dde5;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 20px;
    }

    .title {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .project-list {
      display: grid;
      gap: 10px;
    }

    .project-button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: inherit;
      cursor: pointer;
      padding: 12px;
      text-align: left;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    .project-button:hover,
    .project-button.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .project-name {
      display: block;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .project-meta {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      padding: 14px 18px;
    }

    .current {
      min-width: 0;
    }

    .current h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .current p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .action {
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      padding: 10px 12px;
      text-decoration: none;
    }

    .action.secondary {
      background: #fff;
      color: var(--accent-strong);
    }

    .viewer {
      min-height: 0;
      padding: 14px;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 86px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .empty {
      display: grid;
      min-height: calc(100vh - 86px);
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 820px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      .action {
        flex: 1 1 0;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h1 class="title">Big Slick Games</h1>
      <p class="subtitle">Choose a Big Slick Games title. 21 Hold'em runs here through the existing Docker game service.</p>
      <div id="projectList" class="project-list"></div>
    </aside>

    <main class="main">
      <header class="toolbar">
        <div class="current">
          <h2 id="currentName">No project selected</h2>
          <p id="currentUrl">Choose a project from the launcher.</p>
        </div>
        <div class="actions">
          <button id="reloadButton" class="action secondary" type="button">Reload</button>
          <a id="openButton" class="action" href="#" target="_blank" rel="noreferrer">Open</a>
        </div>
      </header>
      <section id="viewer" class="viewer">
        <div class="empty">No project selected.</div>
      </section>
    </main>
  </div>

  <script id="fallbackProjects" type="application/json">
    {
      "projects": [
        {
          "id": "21holdem-game",
          "name": "21 Hold'em",
          "type": "game",
          "status": "Docker",
          "url": "http://DESKTOP-10JDCIN:3100",
          "description": "21 Hold'em player frontend served by Docker, with API and socket traffic proxied to the Docker backend."
        }
      ]
    }
  </script>

  <script>
    const state = {
      projects: [],
      selected: null,
    };

    const projectList = document.getElementById('projectList');
    const currentName = document.getElementById('currentName');
    const currentUrl = document.getElementById('currentUrl');
    const viewer = document.getElementById('viewer');
    const reloadButton = document.getElementById('reloadButton');
    const openButton = document.getElementById('openButton');

    function getFallbackProjects() {
      return JSON.parse(document.getElementById('fallbackProjects').textContent);
    }

    async function loadProjects() {
      if (window.location.protocol === 'file:') return getFallbackProjects();

      const response = await fetch('./projects.json', { cache: 'no-store' });
      if (!response.ok) throw new Error(`Unable to load projects.json: ${response.status}`);
      return response.json();
    }

    function renderProjectList() {
      projectList.innerHTML = '';

      state.projects.forEach((project) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `project-button${state.selected?.id === project.id ? ' active' : ''}`;
        button.dataset.projectId = project.id;
        button.innerHTML = `
          <span class="project-name"></span>
          <span class="project-meta"></span>
        `;
        button.querySelector('.project-name').textContent = project.name;
        button.querySelector('.project-meta').textContent = `${project.type} · ${project.status}`;
        button.addEventListener('click', () => selectProject(project.id));
        projectList.appendChild(button);
      });
    }

    function resolveProjectUrl(project) {
      if (!project?.url) return '';

      try {
        const parsedUrl = new URL(project.url);
        if (window.location.hostname) parsedUrl.hostname = window.location.hostname;
        return parsedUrl.toString();
      } catch {
        return project.url;
      }
    }

    function selectProject(projectId) {
      const project = state.projects.find((item) => item.id === projectId);
      if (!project) return;

      const projectUrl = resolveProjectUrl(project);
      state.selected = project;
      currentName.textContent = project.name;
      currentUrl.textContent = project.description || projectUrl;
      openButton.href = projectUrl;
      viewer.innerHTML = '';

      const frame = document.createElement('iframe');
      frame.src = projectUrl;
      frame.title = project.name;
      frame.allow = 'fullscreen; clipboard-read; clipboard-write';
      viewer.appendChild(frame);
      renderProjectList();
    }

    reloadButton.addEventListener('click', () => {
      if (!state.selected) return;
      selectProject(state.selected.id);
    });

    loadProjects()
      .then((data) => {
        state.projects = Array.isArray(data.projects) ? data.projects : [];
        renderProjectList();
        if (state.projects.length) selectProject(state.projects[0].id);
      })
      .catch((error) => {
        viewer.innerHTML = `<div class="empty">${error.message}</div>`;
      });
  </script>
</body>
</html>
