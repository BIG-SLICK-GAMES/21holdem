# Example only. Review paths and domains on the server before use.

<VirtualHost *:80>
    ServerName 21-holdem.com
    ServerAlias www.21-holdem.com api.21-holdem.com

    DocumentRoot /var/www/html/game_build/build

    <Directory /var/www/html/game_build/build>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        FallbackResource /index.html
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:3050/api/
    ProxyPassReverse /api/ http://127.0.0.1:3050/api/
    ProxyPass /socket.io/ ws://127.0.0.1:3050/socket.io/
    ProxyPassReverse /socket.io/ ws://127.0.0.1:3050/socket.io/

    ErrorLog ${APACHE_LOG_DIR}/21holdem-error.log
    CustomLog ${APACHE_LOG_DIR}/21holdem-access.log combined
</VirtualHost>
