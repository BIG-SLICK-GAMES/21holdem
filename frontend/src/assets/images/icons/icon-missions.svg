<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1e34"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <linearGradient id="calBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eeff"/>
      <stop offset="100%" stop-color="#c8d4f0"/>
    </linearGradient>
    <linearGradient id="calRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e83030"/>
      <stop offset="100%" stop-color="#9e1818"/>
    </linearGradient>
    <linearGradient id="chBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d49010"/>
      <stop offset="55%" stop-color="#a06800"/>
      <stop offset="100%" stop-color="#6e3e00"/>
    </linearGradient>
    <linearGradient id="chLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d030"/>
      <stop offset="100%" stop-color="#9a6000"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff8a0"/>
      <stop offset="40%" stop-color="#ffd030" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ff9000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lockG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b820"/>
      <stop offset="100%" stop-color="#8a5800"/>
    </linearGradient>
    <linearGradient id="coinG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe040"/>
      <stop offset="100%" stop-color="#c89000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- CALENDAR (top-right, tilted, peeking behind chest) -->
  <g transform="translate(265, 30) rotate(9)">
    <rect width="210" height="192" rx="18" fill="url(#calBg)"/>
    <!-- Red header -->
    <rect x="0" y="0" width="210" height="54" rx="0" fill="url(#calRed)"/>
    <rect x="0" y="0" width="210" height="32" rx="18" fill="url(#calRed)"/>
    <!-- Binder rings -->
    <rect x="56" y="-13" width="13" height="25" rx="6" fill="#aaa"/>
    <rect x="141" y="-13" width="13" height="25" rx="6" fill="#aaa"/>
    <!-- Header text -->
    <text x="105" y="37" text-anchor="middle" fill="white" font-size="18" font-weight="800" font-family="Arial,sans-serif" letter-spacing="1">DAILY</text>
    <!-- Day grid 6x3 -->
    <circle cx="26" cy="84" r="9" fill="#4e84d8" opacity="0.8"/>
    <circle cx="58" cy="84" r="9" fill="#4e84d8" opacity="0.8"/>
    <circle cx="90" cy="84" r="9" fill="#4e84d8" opacity="0.8"/>
    <circle cx="122" cy="84" r="9" fill="#4e84d8" opacity="0.8"/>
    <circle cx="156" cy="84" r="9" fill="#4e84d8" opacity="0.8"/>
    <circle cx="188" cy="84" r="9" fill="#4e84d8" opacity="0.8"/>
    <circle cx="26" cy="120" r="9" fill="#4e84d8" opacity="0.65"/>
    <!-- Today highlighted gold -->
    <circle cx="58" cy="120" r="12" fill="#ffd700" stroke="#daa000" stroke-width="2.5"/>
    <circle cx="90" cy="120" r="9" fill="#4e84d8" opacity="0.45"/>
    <circle cx="122" cy="120" r="9" fill="#4e84d8" opacity="0.45"/>
    <circle cx="156" cy="120" r="9" fill="#4e84d8" opacity="0.45"/>
    <circle cx="188" cy="120" r="9" fill="#4e84d8" opacity="0.35"/>
    <circle cx="26" cy="156" r="9" fill="#4e84d8" opacity="0.28"/>
    <circle cx="58" cy="156" r="9" fill="#4e84d8" opacity="0.28"/>
    <circle cx="90" cy="156" r="9" fill="#4e84d8" opacity="0.28"/>
    <circle cx="122" cy="156" r="9" fill="#4e84d8" opacity="0.22"/>
  </g>

  <!-- Ambient glow behind chest -->
  <ellipse cx="210" cy="335" rx="175" ry="122" fill="url(#glow)" opacity="0.38"/>

  <!-- Chest ground shadow -->
  <ellipse cx="212" cy="462" rx="152" ry="18" fill="#000" opacity="0.3"/>

  <!-- CHEST BODY -->
  <rect x="52" y="330" width="318" height="124" rx="14" fill="url(#chBody)"/>
  <!-- Horizontal band -->
  <rect x="52" y="366" width="318" height="24" fill="#502c00" opacity="0.7"/>
  <!-- Lock plate -->
  <rect x="161" y="339" width="102" height="64" rx="9" fill="url(#lockG)"/>
  <rect x="161" y="339" width="102" height="64" rx="9" fill="none" stroke="#f0d040" stroke-width="2"/>
  <!-- Padlock shackle -->
  <path d="M198,354 Q198,340 212,340 Q226,340 226,354" fill="none" stroke="#7a4800" stroke-width="5.5" stroke-linecap="round"/>
  <rect x="196" y="356" width="32" height="22" rx="5" fill="#7a4800"/>

  <!-- CHEST LID (open, swept back) -->
  <path d="M52,344 Q52,204 212,210 Q372,204 372,344" fill="url(#chLid)"/>
  <path d="M52,344 Q52,204 212,210 Q372,204 372,344" fill="none" stroke="#f2de48" stroke-width="5"/>
  <!-- Inner lid shade -->
  <path d="M58,322 Q60,212 212,218 Q364,212 366,322" fill="#7a5000" opacity="0.35"/>
  <!-- Rim highlight -->
  <rect x="52" y="328" width="318" height="6" rx="0" fill="#e8b020" opacity="0.5"/>

  <!-- Glow from open chest -->
  <ellipse cx="212" cy="328" rx="130" ry="70" fill="url(#glow)" opacity="0.9"/>

  <!-- COINS spilling -->
  <ellipse cx="163" cy="318" rx="27" ry="15" fill="url(#coinG)" stroke="#c89000" stroke-width="2.5"/>
  <ellipse cx="212" cy="308" rx="29" ry="16" fill="url(#coinG)" stroke="#c89000" stroke-width="2.5"/>
  <ellipse cx="261" cy="317" rx="27" ry="15" fill="url(#coinG)" stroke="#c89000" stroke-width="2.5"/>

  <!-- SPARKLE STARS (4-pt polygons) -->
  <polygon points="93,258 97,270 109,274 97,278 93,290 89,278 77,274 89,270" fill="#ffe566" opacity="0.9"/>
  <polygon points="326,248 330,260 342,264 330,268 326,280 322,268 310,264 322,260" fill="#ffe566" opacity="0.82"/>
  <polygon points="212,200 216,211 228,215 216,219 212,230 208,219 196,215 208,211" fill="#ffe566" opacity="0.74"/>
</svg>
